# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
#
# A project_id should be unique per project. buddy-note v1.
project_id = "buddy-note"

[api]
enabled = true
# Port to use for the API URL (http://127.0.0.1:54321).
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in these schemas will get API
# endpoints. `public` and `graphql_public` schemas are included by default.
schemas = ["public"]
# Extra schemas to add to the search_path of every request.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returns from a view, table, or stored procedure. Limits payload size
# for accidental or malicious requests.
max_rows = 1000

[db]
# Port to use for the local database URL.
port = 54322
# Port used by db diff command to initialize the shadow database.
shadow_port = 54320
# The database major version used by the local dev server. This must match your production project
# version. `supabase db reset` will reset the database to the specified major version.
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
# Local email testing (Supabase Auth magic links etc.).
enabled = true
port = 54324

[storage]
enabled = true
# The maximum file size allowed (in bytes). 50 MiB default; buddy-note client downsizes photos.
file_size_limit = "50MiB"

[auth]
enabled = true
# The base URL of your website. Used as an allow-list for redirects and for constructing URLs used
# in emails.
site_url = "http://127.0.0.1:4000"
# A list of *exact* URLs that auth providers are permitted to redirect to post authentication.
additional_redirect_urls = ["http://127.0.0.1:4000/auth/callback"]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour).
jwt_expiry = 3600
# Allow/disallow new user signups.
enable_signup = true

[auth.email]
# Allow/disallow new user signups via email.
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the old, and new email
# addresses.
double_confirm_changes = true
# If enabled, users need to confirm their email address before signing in.
enable_confirmations = false

# External OAuth providers are provisioned in hosted Supabase (Kakao, etc.) — not in local config.

[edge_runtime]
enabled = true
# Supported request policies: `oneshot`, `per_worker`. `per_worker` matches production behaviour.
policy = "oneshot"
inspector_port = 8083

# NOTE: pg_cron / pg_net extensions used by the memory_update_queue worker are enabled via the
# migration script (20260419000001_initial_schema.sql) not here.
